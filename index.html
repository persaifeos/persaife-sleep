<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>persaifeOS · Sleep</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#07070f" />

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="SLEEP" />
  <link rel="apple-touch-icon" href="icons/icon-192.svg" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Bebas+Neue&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg:       #07070f;
      --bg1:      #0c0c18;
      --bg2:      #111120;
      --border:   #1c1c2e;
      --border2:  #252538;
      --text:     #dde0f0;
      --dim:      #555570;
      --dim2:     #333348;
      --green:    #00f5a0;
      --gold:     #ffd166;
      --orange:   #ff9d4d;
      --red:      #ff5f6d;
      --blue:     #6ba3ff;
      --purple:   #b57bff;
      --grey:     #7a7a9a;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bot: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', 'Courier New', monospace;
      font-size: 14px;
      overscroll-behavior: none;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 999;
      opacity: 0.6;
    }

    #app {
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* ── HEADER */
    .header {
      padding: calc(var(--safe-top) + 20px) 20px 16px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .header-eyebrow {
      font-size: 8px;
      letter-spacing: .2em;
      color: var(--green);
      margin-bottom: 4px;
      opacity: 0.7;
    }

    .header-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 32px;
      letter-spacing: .06em;
      line-height: 1;
      color: var(--text);
    }

    .header-title span { color: var(--green); }

    .header-sub {
      font-size: 9px;
      color: var(--dim);
      margin-top: 5px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .leader-dot {
      display: inline-block;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: .4; transform: scale(.7); }
    }

    /* ── NAV */
    .nav {
      display: flex;
      gap: 6px;
      padding: 12px 18px;
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      scrollbar-width: none;
    }
    .nav::-webkit-scrollbar { display: none; }

    .nav-btn {
      flex-shrink: 0;
      background: none;
      border: 1px solid var(--border2);
      color: var(--dim);
      padding: 5px 13px;
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      letter-spacing: .12em;
      border-radius: 4px;
      cursor: pointer;
      transition: all .18s;
    }
    .nav-btn.active { border-color: var(--green); color: var(--green); background: rgba(0,245,160,.04); }
    .nav-btn.active-nap { border-color: var(--gold); color: var(--gold); background: rgba(255,209,102,.04); }

    /* ── SCROLL CONTENT */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 16px 18px calc(var(--safe-bot) + 24px);
      -webkit-overflow-scrolling: touch;
    }

    /* ── CARDS */
    .card {
      background: var(--bg1);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .card-label {
      font-size: 8px;
      letter-spacing: .15em;
      color: var(--dim);
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    /* ── PLAYER CARD */
    .player-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }

    .player-card {
      background: var(--bg1);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      position: relative;
      overflow: hidden;
    }
    .player-card.leading { border-color: rgba(0,245,160,.18); }
    .player-card::after {
      content: '';
      position: absolute;
      top: -30px; right: -30px;
      width: 80px; height: 80px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,245,160,.04) 0%, transparent 70%);
      pointer-events: none;
    }

    .player-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      letter-spacing: .06em;
      margin-bottom: 2px;
    }

    .player-score {
      font-size: 44px;
      font-weight: 300;
      line-height: 1;
      margin-top: 4px;
      transition: color .3s;
    }

    .player-grade { font-size: 8px; margin-top: 2px; letter-spacing: .1em; }

    .player-stats {
      margin-top: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px 14px;
      border-top: 1px solid var(--border);
      padding-top: 10px;
    }

    .stat-item .stat-label { font-size: 7px; color: var(--dim); letter-spacing: .1em; text-transform: uppercase; }
    .stat-item .stat-val   { font-size: 12px; margin-top: 1px; }

    /* ── TIER BADGE */
    .tier-badge {
      display: inline-flex;
      align-items: center;
      font-size: 8px;
      border-radius: 3px;
      padding: 2px 6px;
      border: 1px solid;
      letter-spacing: .06em;
    }

    /* ── FORM ELEMENTS */
    .field { margin-bottom: 11px; }
    .field-label { font-size: 8px; color: var(--dim); letter-spacing: .12em; text-transform: uppercase; margin-bottom: 5px; }

    .inp {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border2);
      color: var(--text);
      padding: 9px 12px;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      border-radius: 8px;
      outline: none;
      transition: border-color .18s;
      -webkit-appearance: none;
    }
    .inp:focus { border-color: rgba(0,245,160,.5); }
    .inp:disabled { opacity: .3; cursor: not-allowed; }

    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }

    /* Trust tier radio */
    .tier-options { display: grid; gap: 7px; }
    .tier-option {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid transparent;
      cursor: pointer;
      transition: all .15s;
      background: var(--bg);
    }
    .tier-option.selected { background: rgba(255,255,255,.03); }
    .tier-option input { margin-top: 3px; flex-shrink: 0; }
    .tier-option-name { font-size: 10px; margin-bottom: 2px; }
    .tier-option-desc { font-size: 8px; color: var(--dim); line-height: 1.5; font-style: italic; }

    /* Phase bars */
    .phase-bar-wrap { margin-bottom: 8px; }
    .phase-bar-meta { display: flex; justify-content: space-between; font-size: 8px; color: var(--dim); margin-bottom: 3px; }
    .phase-bar-track { height: 4px; background: var(--bg2); border-radius: 2px; position: relative; }
    .phase-bar-fill { height: 100%; border-radius: 2px; transition: width .5s ease; }
    .phase-bar-target { position: absolute; top: -3px; width: 1px; height: 10px; background: rgba(255,255,255,.12); }

    /* Preview score */
    .preview-score {
      text-align: center;
      padding: 16px;
      border-radius: 10px;
      background: var(--bg);
      border: 1px solid;
      margin-bottom: 11px;
    }
    .preview-num { font-size: 56px; font-weight: 300; line-height: 1; }
    .preview-grade { font-size: 9px; margin-top: 2px; letter-spacing: .1em; }
    .preview-meta { font-size: 9px; color: var(--dim); margin-top: 6px; }

    /* Buttons */
    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 9px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: .12em;
      cursor: pointer;
      transition: opacity .18s, transform .1s;
    }
    .btn:active { transform: scale(.98); }
    .btn-primary { background: var(--green); color: #07070f; }
    .btn-nap     { background: var(--gold);  color: #07070f; }

    /* History entry */
    .history-entry {
      background: var(--bg1);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 13px 14px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
    }
    .entry-left { flex: 1; min-width: 0; }
    .entry-meta { font-size: 9px; color: var(--dim); display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
    .entry-times { font-size: 11px; margin-top: 3px; }
    .entry-detail { font-size: 9px; color: var(--dim); margin-top: 3px; }
    .entry-phases { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 5px; }
    .entry-phase-tag { font-size: 8px; }
    .entry-nap { font-size: 8px; margin-top: 4px; }
    .entry-right { text-align: right; flex-shrink: 0; }
    .entry-night-score { font-size: 10px; color: var(--dim); text-decoration: line-through; }
    .entry-final { font-size: 30px; font-weight: 300; line-height: 1; }
    .entry-grade { font-size: 8px; letter-spacing: .08em; }

    /* Rubric */
    .rubric-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 9px 0;
      border-bottom: 1px solid var(--border);
      gap: 8px;
    }
    .rubric-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; margin-top: 3px; }
    .rubric-name { font-size: 10px; color: var(--text); }
    .rubric-desc { font-size: 8px; color: var(--dim); margin-top: 2px; line-height: 1.4; }
    .rubric-pts { font-size: 13px; font-weight: 300; flex-shrink: 0; }

    /* Divider */
    .divider { height: 1px; background: var(--border); margin: 12px 0; }

    /* Nap modifier table */
    .nap-row { padding: 8px 0; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; gap: 8px; }
    .nap-when { font-size: 10px; color: var(--text); }
    .nap-desc { font-size: 8px; color: var(--dim); margin-top: 2px; }
    .nap-pts { font-size: 16px; font-weight: 300; flex-shrink: 0; }

    /* Empty state */
    .empty { text-align: center; padding: 50px 20px; color: var(--dim); font-size: 12px; line-height: 1.8; }

    /* Sub nav */
    .sub-nav { display: flex; gap: 7px; margin-bottom: 14px; }

    /* Install banner */
    .install-banner {
      background: linear-gradient(135deg, rgba(0,245,160,.08), rgba(107,163,255,.06));
      border: 1px solid rgba(0,245,160,.2);
      border-radius: 12px;
      padding: 13px 14px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .install-icon { font-size: 20px; flex-shrink: 0; }
    .install-text { flex: 1; }
    .install-title { font-size: 10px; color: var(--green); margin-bottom: 2px; }
    .install-desc  { font-size: 8px; color: var(--dim); line-height: 1.5; }
    .install-btn {
      background: var(--green);
      color: #07070f;
      border: none;
      padding: 6px 12px;
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      font-weight: 500;
      border-radius: 6px;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* persaifeOS footer watermark */
    .watermark {
      text-align: center;
      padding: 20px 0 4px;
      font-size: 8px;
      color: var(--dim2);
      letter-spacing: .15em;
    }
  </style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-eyebrow">persaifeOS · LIFE OS</div>
    <div class="header-title">SLEEP <span>BOARD</span></div>
    <div class="header-sub" id="header-sub">
      <span class="leader-dot"></span>
      <span id="leader-text">Loading...</span>
    </div>
  </div>

  <div class="nav" id="main-nav">
    <button class="nav-btn active" data-view="board">BOARD</button>
    <button class="nav-btn" data-view="log">LOG</button>
    <button class="nav-btn" data-view="history">HISTORY</button>
    <button class="nav-btn" data-view="rubric">RUBRIC</button>
  </div>

  <div class="content" id="content"></div>
</div>

<script>
// ─── CONSTANTS ────────────────────────────────────────────────
const STORAGE_KEY = 'persaife-sleep-v3';
const PLAYERS = ["Joey", "Dad", "Ivy", "Kiki", "Dada", "Maximus"];

const TRUST = {
  T1: { label: '⌚ Watch Auto',      color: '#00f5a0', watchPts: 10, phaseMult: 1.0, durMult: 1.0 },
  T2: { label: '📱 Health Manual',   color: '#ffd166', watchPts: 5,  phaseMult: 0.5, durMult: 1.0 },
  T3: { label: '✏️ Unverified Guess', color: '#ff5f6d', watchPts: 0,  phaseMult: 0.0, durMult: 0.65 },
};

const TRUST_DESCS = {
  T1: 'Watch worn all night → phases auto-tracked → full score',
  T2: 'Entered in Apple Health app → timing trusted, phases ×0.5',
  T3: 'Memory estimate → duration ×0.65, no phase credit — avoid',
};

// ─── STATE ────────────────────────────────────────────────────
let state = { entries: [], streaks: { Joey: 0, Dad: 0 } };
let currentView = 'board';
let logSubView = 'night';
let deferredPrompt = null;

// Form state
let nf = defaultNightForm();
let napF = defaultNapForm();

function defaultNightForm() {
  return {
    player: 'Joey',
    date: today(),
    bedtime: '23:30', wakeTime: '07:00',
    trustTier: 'T1',
    deepPct: '', remPct: '', corePct: '', awakePct: ''
  };
}
function defaultNapForm() {
  return { player: 'Joey', napStart: '13:30', napDurMin: '25', trustTier: 'T1' };
}

// ─── PERSISTENCE ─────────────────────────────────────────────
function loadState() {
  try { const s = localStorage.getItem(STORAGE_KEY); if (s) state = JSON.parse(s); } catch {}
}
function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch {}
}

// ─── UTILS ───────────────────────────────────────────────────
function today() { return new Date().toISOString().slice(0, 10); }

function timeToDecimal(t) {
  if (!t) return 0;
  const [h, m] = t.split(':').map(Number);
  return h + m / 60;
}

function getDuration(bed, wake) {
  let b = timeToDecimal(bed), w = timeToDecimal(wake);
  if (w <= b) w += 24;
  return +(w - b).toFixed(2);
}

function parsePct(v) { return v !== '' ? parseFloat(v) : null; }

function gradeColor(s) {
  if (s >= 90) return '#00f5a0';
  if (s >= 75) return '#7bffcc';
  if (s >= 60) return '#ffd166';
  if (s >= 45) return '#ff9d4d';
  return '#ff5f6d';
}
function gradeLabel(s) {
  if (s >= 90) return 'ELITE';
  if (s >= 75) return 'SOLID';
  if (s >= 60) return 'OKAY';
  if (s >= 45) return 'DRIFTING';
  return 'WRECKED';
}

// ─── SCORING ─────────────────────────────────────────────────
function calcNightScore({ duration, deepPct, remPct, corePct, awakePct, tier, streak }) {
  const t = TRUST[tier] || TRUST.T3;
  const dur   = Math.max(0, 30 - Math.abs(duration - 7.5) * 10) * t.durMult;
  const deep  = (deepPct  != null ? Math.max(0, 20 - Math.abs(deepPct  - 20) * 2)   : 10) * t.phaseMult;
  const rem   = (remPct   != null ? Math.max(0, 15 - Math.abs(remPct   - 22) * 1.5) : 7.5)* t.phaseMult;
  const core  = (corePct  != null ? Math.max(0, 10 - Math.abs(corePct  - 52) / 2)   : 5)  * t.phaseMult;
  const awake = (awakePct != null ? Math.max(0, 10 - Math.max(0, awakePct - 5) * 2) : 5)  * t.phaseMult;
  const watch = t.watchPts;
  const str   = Math.min(5, (streak || 0) * 0.5);
  return Math.round(dur + deep + rem + core + awake + watch + str);
}

function napModifier(startHour, durMin) {
  if (startHour >= 17) return { pts: -10, label: 'Late nap — kills deep sleep tonight 🔴' };
  if (startHour >= 15) return { pts:  3,  label: 'Neutral-zone nap ⚠️' };
  if (durMin >= 75 && durMin <= 105) return { pts: 10, label: 'Full cycle — elite recovery 🟢' };
  if (durMin >= 15 && durMin <= 35)  return { pts:  9, label: 'Power nap — clean boost 🟢' };
  if (durMin >= 36 && durMin <= 74)  return { pts:  5, label: 'Mid-length nap ✅' };
  return { pts: 3, label: 'Short pre-3pm nap ✅' };
}

// ─── PLAYER STATS ─────────────────────────────────────────────
function getPlayerStats() {
  return PLAYERS.map(p => {
    const pe = state.entries.filter(e => e.player === p && e.type === 'night');
    const avg = pe.length ? Math.round(pe.reduce((s,e) => s + e.finalScore, 0) / pe.length) : null;
    const withDeep = pe.filter(e => e.deepPct != null);
    const withRem  = pe.filter(e => e.remPct  != null);
    return {
      player: p, avg, streak: state.streaks[p] || 0,
      best: pe.length ? Math.max(...pe.map(e => e.finalScore)) : null,
      count: pe.length,
      avgDeep: withDeep.length ? +(withDeep.reduce((s,e)=>s+e.deepPct,0)/withDeep.length).toFixed(1) : null,
      avgRem:  withRem.length  ? +(withRem.reduce((s,e)=>s+e.remPct,0)/withRem.length).toFixed(1)   : null,
      t1pct: pe.length ? Math.round(pe.filter(e=>e.trustTier==='T1').length/pe.length*100) : null,
    };
  }).sort((a,b) => (b.avg||0) - (a.avg||0));
}

// ─── RENDER ENGINE ────────────────────────────────────────────
function render() {
  const stats = getPlayerStats();
  updateHeader(stats);
  const content = document.getElementById('content');
  if (currentView === 'board')   content.innerHTML = renderBoard(stats);
  if (currentView === 'log')     content.innerHTML = renderLog();
  if (currentView === 'history') content.innerHTML = renderHistory();
  if (currentView === 'rubric')  content.innerHTML = renderRubric();
  attachListeners();
}

function updateHeader(stats) {
  const leader = stats[0];
  const el = document.getElementById('leader-text');
  if (leader?.avg != null) {
    el.textContent = `${leader.player} leading · ${leader.avg} avg`;
  } else {
    el.textContent = 'No entries yet — log tonight';
  }
}

// ── BOARD ──────────────────────────────────────────────────────
function renderBoard(stats) {
  const playerCards = stats.map((p, i) => `
    <div class="player-card ${i===0&&p.avg!=null?'leading':''}">
      ${i===0&&p.avg!=null?'<div style="font-size:7px;color:var(--green);letter-spacing:.12em;margin-bottom:6px">LEADING</div>':''}
      <div class="player-name">${p.player}</div>
      <div class="player-score" style="color:${p.avg!=null?gradeColor(p.avg):'var(--border2)'}">${p.avg??'--'}</div>
      ${p.avg!=null?`<div class="player-grade" style="color:${gradeColor(p.avg)}">${gradeLabel(p.avg)}</div>`:''}
      <div class="player-stats">
        ${[['Streak',`${p.streak}d 🔥`],['Best',p.best??'--'],['Nights',p.count],
           ['Avg Deep',p.avgDeep!=null?`${p.avgDeep}%`:'--'],
           ['Avg REM', p.avgRem!=null?`${p.avgRem}%`:'--'],
           ['Verified',p.t1pct!=null?`${p.t1pct}%`:'--']
          ].map(([k,v])=>`<div class="stat-item"><div class="stat-label">${k}</div><div class="stat-val">${v}</div></div>`).join('')}
      </div>
    </div>
  `).join('');

  const napTable = [
    ['Before 3pm · 75–105min','Full cycle recovery','+10','var(--green)'],
    ['Before 3pm · 15–35min', 'Power nap','+9','var(--green)'],
    ['Before 3pm · 36–74min', 'Mid-length nap','+5','var(--green)'],
    ['3pm – 5pm · any',       'Neutral zone','+3','var(--gold)'],
    ['After 5pm · any',       'Kills tonight\'s deep sleep','−10','var(--red)'],
  ].map(([w,d,p,c])=>`
    <div class="nap-row">
      <div><div class="nap-when">${w}</div><div class="nap-desc">${d}</div></div>
      <div class="nap-pts" style="color:${c}">${p}</div>
    </div>
  `).join('');

  const installBanner = deferredPrompt ? `
    <div class="install-banner">
      <div class="install-icon">📲</div>
      <div class="install-text">
        <div class="install-title">INSTALL APP</div>
        <div class="install-desc">Add to home screen for full offline access</div>
      </div>
      <button class="install-btn" id="install-btn">INSTALL</button>
    </div>
  ` : '';

  return `
    ${installBanner}
    <div class="player-grid">${playerCards}</div>
    <div class="card">
      <div class="card-label">NAP MODIFIER SCALE</div>
      ${napTable}
      <div style="font-size:8px;color:var(--dim2);margin-top:10px;font-style:italic">
        Nap stacks onto night score · max daily: 105 · floor: 0
      </div>
    </div>
    <div class="watermark">persaifeOS · SLEEP SYSTEM v3</div>
  `;
}

// ── LOG ────────────────────────────────────────────────────────
function renderLog() {
  return `
    <div class="sub-nav">
      <button class="nav-btn ${logSubView==='night'?'active':''}" data-sub="night">🌙 NIGHT</button>
      <button class="nav-btn ${logSubView==='nap'?'active-nap':''}" data-sub="nap">☀️ NAP</button>
    </div>
    ${logSubView === 'night' ? renderNightLog() : renderNapLog()}
  `;
}

function renderNightLog() {
  const dur = nf.bedtime && nf.wakeTime ? getDuration(nf.bedtime, nf.wakeTime) : null;
  const preview = dur ? calcNightScore({
    duration: dur, tier: nf.trustTier,
    streak: (state.streaks[nf.player]||0)+1,
    deepPct: parsePct(nf.deepPct), remPct: parsePct(nf.remPct),
    corePct: parsePct(nf.corePct), awakePct: parsePct(nf.awakePct)
  }) : null;

  const tierOptions = Object.entries(TRUST).map(([k,t]) => `
    <label class="tier-option ${nf.trustTier===k?'selected':''}" style="border-color:${nf.trustTier===k?t.color+'44':'transparent'}">
      <input type="radio" name="trust" value="${k}" ${nf.trustTier===k?'checked':''} />
      <div>
        <div class="tier-option-name" style="color:${t.color}">${t.label}</div>
        <div class="tier-option-desc">${TRUST_DESCS[k]}</div>
      </div>
    </label>
  `).join('');

  const phaseDisabled = nf.trustTier === 'T3';
  const phaseOpacity  = phaseDisabled ? '.3' : '1';
  const phaseNote = phaseDisabled
    ? '⚠️ Phases carry zero weight at T3 — fields locked'
    : nf.trustTier === 'T2'
    ? '⚠️ Phase scores at 50% credit (Health Manual)'
    : 'Full phase credit — enter from Apple Health';

  const phaseBars = ['deepPct','remPct','corePct','awakePct'].some(k => nf[k] !== '') && !phaseDisabled
    ? `<div style="margin-top:12px">${[
        ['Deep',parsePct(nf.deepPct),'#6ba3ff',20,40],
        ['REM',parsePct(nf.remPct),'#b57bff',22,40],
        ['Core',parsePct(nf.corePct),'#7a7a9a',52,80],
        ['Awake',parsePct(nf.awakePct),'#ff5f6d',5,20],
      ].map(([l,v,c,t,mx]) => phaseBar(l,v,c,t,mx)).join('')}</div>` : '';

  const previewHtml = preview != null ? `
    <div class="preview-score" style="border-color:${gradeColor(preview)}44">
      <div class="preview-num" style="color:${gradeColor(preview)}">${preview}</div>
      <div class="preview-grade" style="color:${gradeColor(preview)}">${gradeLabel(preview)}</div>
      <div class="preview-meta">${dur?.toFixed(1)}h · streak ${(state.streaks[nf.player]||0)+1}d</div>
    </div>
  ` : '';

  return `
    <div class="card">
      <div class="card-label">LOG LAST NIGHT</div>

      <div class="grid2">
        <div class="field">
          <div class="field-label">Player</div>
          <select class="inp" id="nf-player">
            ${PLAYERS.map(p=>`<option ${nf.player===p?'selected':''}>${p}</option>`).join('')}
          </select>
        </div>
        <div class="field">
          <div class="field-label">Date</div>
          <input type="date" class="inp" id="nf-date" value="${nf.date}" />
        </div>
      </div>

      <div class="grid2">
        <div class="field">
          <div class="field-label">Bedtime</div>
          <input type="time" class="inp" id="nf-bedtime" value="${nf.bedtime}" />
        </div>
        <div class="field">
          <div class="field-label">Wake Time</div>
          <input type="time" class="inp" id="nf-wake" value="${nf.wakeTime}" />
        </div>
      </div>

      <div class="field">
        <div class="field-label" style="margin-bottom:8px">Data Source · Trust Tier</div>
        <div class="tier-options">${tierOptions}</div>
      </div>

      <div class="field" style="background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px">
        <div class="field-label" style="color:rgba(0,245,160,.5);margin-bottom:4px">Sleep Phases · Apple Health</div>
        <div style="font-size:8px;color:var(--dim);margin-bottom:10px;font-style:italic">${phaseNote}</div>
        <div class="grid2" style="opacity:${phaseOpacity}">
          ${[['deepPct','Deep %','#6ba3ff'],['remPct','REM %','#b57bff'],['corePct','Core %','#7a7a9a'],['awakePct','Awake %','#ff5f6d']].map(([k,l,c])=>`
            <div class="field" style="margin-bottom:0">
              <div class="field-label" style="color:${c}">${l}</div>
              <input type="number" class="inp" id="nf-${k}" min="0" max="100" placeholder="—"
                value="${nf[k]}" ${phaseDisabled?'disabled':''}
                style="border-color:${nf[k]!==''?c+'55':'var(--border2)'}" />
            </div>
          `).join('')}
        </div>
        ${phaseBars}
      </div>

      ${previewHtml}
      <button class="btn btn-primary" id="log-night-btn">LOG NIGHT</button>
    </div>
  `;
}

function renderNapLog() {
  const hour = napF.napStart ? timeToDecimal(napF.napStart) : null;
  const dur  = parseFloat(napF.napDurMin) || 0;
  const mod  = (hour != null && dur > 0) ? napModifier(hour, dur) : null;

  const previewHtml = mod ? `
    <div class="preview-score" style="border-color:${mod.pts>0?'rgba(255,209,102,.3)':'rgba(255,95,109,.3)'}">
      <div class="preview-num" style="color:${mod.pts>0?'var(--gold)':'var(--red)'}">${mod.pts>0?'+':''}${mod.pts}</div>
      <div style="font-size:9px;color:var(--dim);margin-top:6px">${mod.label}</div>
      ${napF.trustTier==='T3'?'<div style="font-size:8px;color:var(--orange);margin-top:4px">⚠️ T3 flagged — modifier applies but noted as unverified</div>':''}
    </div>
  ` : '';

  return `
    <div class="card" style="border-color:rgba(255,209,102,.12)">
      <div class="card-label" style="color:var(--gold)">LOG A NAP</div>
      <div style="font-size:8px;color:var(--dim);margin-bottom:14px;font-style:italic">Attaches to today's night entry · adjusts daily score</div>

      <div class="field">
        <div class="field-label">Player</div>
        <select class="inp" id="nap-player">
          ${PLAYERS.map(p=>`<option ${napF.player===p?'selected':''}>${p}</option>`).join('')}
        </select>
      </div>

      <div class="grid2">
        <div class="field">
          <div class="field-label">Nap Start</div>
          <input type="time" class="inp" id="nap-start" value="${napF.napStart}" />
        </div>
        <div class="field">
          <div class="field-label">Duration (min)</div>
          <input type="number" class="inp" id="nap-dur" min="5" max="180" placeholder="25" value="${napF.napDurMin}" />
        </div>
      </div>

      <div class="field">
        <div class="field-label">Data Source</div>
        <select class="inp" id="nap-tier">
          <option value="T1" ${napF.trustTier==='T1'?'selected':''}>⌚ Watch Auto-tracked</option>
          <option value="T2" ${napF.trustTier==='T2'?'selected':''}>📱 Health Manual</option>
          <option value="T3" ${napF.trustTier==='T3'?'selected':''}>✏️ Rough estimate</option>
        </select>
      </div>

      ${previewHtml}
      <button class="btn btn-nap" id="log-nap-btn">LOG NAP</button>
    </div>
  `;
}

function phaseBar(label, value, color, target, max) {
  const pct = value != null ? Math.min(100, (value / max) * 100) : 0;
  const tPct = Math.min(100, (target / max) * 100);
  return `
    <div class="phase-bar-wrap">
      <div class="phase-bar-meta">
        <span>${label}</span>
        <span style="color:${color}">${value!=null?value+'%':'—'} <span style="color:var(--dim2)">/ ${target}% ideal</span></span>
      </div>
      <div class="phase-bar-track">
        <div class="phase-bar-fill" style="width:${pct}%;background:${color}"></div>
        <div class="phase-bar-target" style="left:${tPct}%"></div>
      </div>
    </div>
  `;
}

// ── HISTORY ────────────────────────────────────────────────────
function renderHistory() {
  if (!state.entries.length) return `<div class="empty">No entries yet.<br>Log your first night to begin.</div>`;

  return state.entries.map(e => {
    const t = TRUST[e.trustTier] || TRUST.T3;
    const score = e.finalScore ?? e.nightScore;
    const hasNap = e.napMod && e.napMod !== 0;
    const phases = [
      e.deepPct!=null?`<span class="entry-phase-tag" style="color:#6ba3ff">D ${e.deepPct}%</span>`:'',
      e.remPct!=null?`<span class="entry-phase-tag" style="color:#b57bff">R ${e.remPct}%</span>`:'',
      e.corePct!=null?`<span class="entry-phase-tag" style="color:#7a7a9a">C ${e.corePct}%</span>`:'',
      e.awakePct!=null?`<span class="entry-phase-tag" style="color:#ff5f6d">A ${e.awakePct}%</span>`:'',
    ].filter(Boolean).join('');

    return `
      <div class="history-entry">
        <div class="entry-left">
          <div class="entry-meta">
            <span>${e.date}</span>
            <span>·</span>
            <span>${e.player}</span>
            <span class="tier-badge" style="color:${t.color};border-color:${t.color}55">${t.label}</span>
          </div>
          <div class="entry-times">${e.bedtime} → ${e.wakeTime} <span style="color:var(--dim)">${e.duration?.toFixed(1)}h</span></div>
          <div class="entry-detail">🔥 ${e.streak}d streak</div>
          ${phases?`<div class="entry-phases">${phases}</div>`:''}
          ${hasNap?`<div class="entry-nap" style="color:${e.napMod>0?'var(--gold)':'var(--red)'}">
            ☀️ Nap ${e.napMod>0?'+':''}${e.napMod} @ ${e.napTime} (${e.napDur}min) · ${e.napLabel}
          </div>`:''}
        </div>
        <div class="entry-right">
          ${hasNap?`<div class="entry-night-score">${e.nightScore}</div>`:''}
          <div class="entry-final" style="color:${gradeColor(score)}">${score}</div>
          <div class="entry-grade" style="color:${gradeColor(score)}">${gradeLabel(score)}</div>
        </div>
      </div>
    `;
  }).join('') + '<div class="watermark">persaifeOS · SLEEP SYSTEM v3</div>';
}

// ── RUBRIC ─────────────────────────────────────────────────────
function renderRubric() {
  const nightRows = [
    ['Duration','0–30','Peak 7.5h · −5/30min off','#dde0f0'],
    ['Deep Sleep %','0–20','Peak 20% · −2/1% off','#6ba3ff'],
    ['REM Sleep %','0–15','Peak 22% · −1.5/1% off','#b57bff'],
    ['Core Sleep %','0–10','Peak 52% · mild penalty','#7a7a9a'],
    ['Awake %','0–10','10 if <5% · −2/1% over','#ff5f6d'],
    ['Watch / Source','0–10','Auto=10 · Manual=5 · Guess=0','#ffd166'],
    ['Streak Bonus','0–5','+0.5/night · max 5','#00f5a0'],
  ].map(([k,p,d,c])=>`
    <div class="rubric-row">
      <div class="rubric-dot" style="background:${c}"></div>
      <div style="flex:1">
        <div class="rubric-name">${k} <span style="color:var(--dim);font-size:9px">(${p})</span></div>
        <div class="rubric-desc">${d}</div>
      </div>
    </div>
  `).join('');

  const napRows = [
    ['Before 3pm · 75–105min','+10','Full cycle · elite recovery','#00f5a0'],
    ['Before 3pm · 15–35min', '+9', 'Power nap · clean boost','#00f5a0'],
    ['Before 3pm · 36–74min', '+5', 'Mid-length nap','#7bffcc'],
    ['3pm – 5pm · any',       '+3', 'Neutral zone','#ffd166'],
    ['After 5pm · any',       '−10','Cannibalizes deep sleep','#ff5f6d'],
  ].map(([w,p,d,c])=>`
    <div class="rubric-row">
      <div style="flex:1"><div class="rubric-name">${w}</div><div class="rubric-desc">${d}</div></div>
      <div class="rubric-pts" style="color:${c}">${p}</div>
    </div>
  `).join('');

  const tierRows = Object.entries(TRUST).map(([k,t])=>`
    <div class="rubric-row">
      <div class="rubric-dot" style="background:${t.color}"></div>
      <div style="flex:1">
        <div class="rubric-name" style="color:${t.color}">${t.label}</div>
        <div class="rubric-desc">Dur ×${t.durMult} · Phases ×${t.phaseMult} · Watch ${t.watchPts}pts</div>
      </div>
    </div>
  `).join('');

  return `
    <div class="card">
      <div class="card-label">NIGHT SCORE · 95 PTS MAX</div>
      ${nightRows}
    </div>
    <div class="card" style="border-color:rgba(255,209,102,.15)">
      <div class="card-label" style="color:var(--gold)">NAP MODIFIER · −10 to +10</div>
      ${napRows}
      <div style="font-size:8px;color:var(--dim2);margin-top:8px;font-style:italic">Daily max: 105 · floor: 0</div>
    </div>
    <div class="card">
      <div class="card-label">TRUST TIER MULTIPLIERS</div>
      ${tierRows}
    </div>
    <div class="watermark">persaifeOS · SLEEP SYSTEM v3</div>
  `;
}

// ─── EVENT LISTENERS ──────────────────────────────────────────
function attachListeners() {
  // Main nav
  document.querySelectorAll('#main-nav .nav-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      currentView = btn.dataset.view;
      document.querySelectorAll('#main-nav .nav-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    });
  });

  // Sub nav (log)
  document.querySelectorAll('[data-sub]').forEach(btn => {
    btn.addEventListener('click', () => {
      logSubView = btn.dataset.sub;
      render();
    });
  });

  // Night form live sync
  const syncNF = (id, key) => {
    const el = document.getElementById(id);
    if (el) el.addEventListener('input', () => { nf[key] = el.value; render(); });
  };
  syncNF('nf-player','player'); syncNF('nf-date','date');
  syncNF('nf-bedtime','bedtime'); syncNF('nf-wake','wakeTime');
  syncNF('nf-deepPct','deepPct'); syncNF('nf-remPct','remPct');
  syncNF('nf-corePct','corePct'); syncNF('nf-awakePct','awakePct');

  // Trust tier radios
  document.querySelectorAll('input[name="trust"]').forEach(radio => {
    radio.addEventListener('change', () => { nf.trustTier = radio.value; render(); });
  });

  // Nap form live sync
  const syncNap = (id, key) => {
    const el = document.getElementById(id);
    if (el) el.addEventListener('input', () => { napF[key] = el.value; render(); });
  };
  syncNap('nap-player','player'); syncNap('nap-start','napStart');
  syncNap('nap-dur','napDurMin'); syncNap('nap-tier','trustTier');

  // Log night
  const logNightBtn = document.getElementById('log-night-btn');
  if (logNightBtn) logNightBtn.addEventListener('click', () => {
    const duration = getDuration(nf.bedtime, nf.wakeTime);
    const streak   = (state.streaks[nf.player]||0)+1;
    const score    = calcNightScore({
      duration, tier: nf.trustTier, streak,
      deepPct: parsePct(nf.deepPct), remPct: parsePct(nf.remPct),
      corePct: parsePct(nf.corePct), awakePct: parsePct(nf.awakePct)
    });
    state.entries.unshift({
      id: Date.now(), type:'night', player: nf.player, date: nf.date,
      bedtime: nf.bedtime, wakeTime: nf.wakeTime,
      duration, trustTier: nf.trustTier, streak, nightScore: score,
      napMod: 0, finalScore: score,
      deepPct: parsePct(nf.deepPct), remPct: parsePct(nf.remPct),
      corePct: parsePct(nf.corePct), awakePct: parsePct(nf.awakePct)
    });
    if (state.entries.length > 120) state.entries.pop();
    state.streaks[nf.player] = streak;
    saveState();
    nf = defaultNightForm();
    render();
  });

  // Log nap
  const logNapBtn = document.getElementById('log-nap-btn');
  if (logNapBtn) logNapBtn.addEventListener('click', () => {
    const hour = timeToDecimal(napF.napStart);
    const dur  = parseFloat(napF.napDurMin)||0;
    const mod  = napModifier(hour, dur);
    const todayStr = today();
    state.entries = state.entries.map(e => {
      if (e.type==='night' && e.player===napF.player && e.date===todayStr) {
        const newMod = Math.max(-10, Math.min(10, (e.napMod||0) + mod.pts));
        return { ...e, napMod: newMod, finalScore: Math.max(0, e.nightScore + newMod), napLabel: mod.label, napTime: napF.napStart, napDur: dur };
      }
      return e;
    });
    saveState();
    napF = defaultNapForm();
    render();
  });

  // Install button
  const installBtn = document.getElementById('install-btn');
  if (installBtn) installBtn.addEventListener('click', async () => {
    if (deferredPrompt) {
      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
      deferredPrompt = null;
      render();
    }
  });
}

// ─── INIT ─────────────────────────────────────────────────────
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  render();
});

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  });
}

loadState();
render();
</script>
</body>
</html>
